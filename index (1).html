<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Zone – Personality & Career</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00ff87;
    --gold: #ffd700;
    --dark: #0a0a0f;
    --card: #12121a;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,255,135,0.07) 0%, transparent 70%),
      repeating-linear-gradient(90deg, transparent, transparent 119px, rgba(255,255,255,0.015) 120px),
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.015) 80px);
    pointer-events: none; z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }

  header { text-align: center; padding: 40px 0 24px; }
  header .badge {
    display: inline-block; background: var(--green); color: var(--dark);
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: 11px; letter-spacing: 3px; padding: 4px 14px;
    border-radius: 2px; margin-bottom: 14px; text-transform: uppercase;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 11vw, 88px); line-height: 0.88; letter-spacing: 2px;
    background: linear-gradient(135deg, #fff 30%, var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  header p { color: var(--muted); margin-top: 12px; font-size: 15px; }

  .tabs { display: flex; gap: 8px; margin: 28px 0 20px; }
  .tab {
    flex: 1; padding: 14px; background: var(--card);
    border: 2px solid var(--border); border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    font-size: 18px; letter-spacing: 1px; color: var(--muted);
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .tab.active { border-color: var(--green); color: var(--green); background: rgba(0,255,135,0.06); }
  .tab:hover:not(.active) { border-color: #444; color: var(--text); }

  .section { display: none; animation: fadeUp 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 26px; margin-bottom: 16px;
  }
  .card h2 {
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: 22px; letter-spacing: 1px; color: var(--green);
    margin-bottom: 18px; text-transform: uppercase;
  }

  .form-grid { display: grid; gap: 14px; }
  label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
  select {
    width: 100%; background: #1a1a26; border: 1.5px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: 'Barlow', sans-serif;
    font-size: 15px; padding: 12px 14px; outline: none;
    transition: border-color 0.2s; appearance: none; cursor: pointer;
  }
  select:focus { border-color: var(--green); }
  select option { background: #1a1a26; }

  .btn {
    display: block; width: 100%; padding: 16px;
    background: var(--green); color: var(--dark);
    font-family: 'Barlow Condensed', sans-serif; font-weight: 900;
    font-size: 20px; letter-spacing: 2px; border: none;
    border-radius: 8px; cursor: pointer; transition: all 0.2s;
    margin-top: 8px; text-transform: uppercase;
  }
  .btn:hover { background: #00e67a; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,255,135,0.25); }

  .btn-outline {
    background: transparent !important; color: var(--green) !important;
    border: 2px solid var(--green) !important; font-size: 16px !important; padding: 12px !important;
  }
  .btn-outline:hover { background: rgba(0,255,135,0.08) !important; transform: none !important; box-shadow: none !important; }

  .result {
    display: none; background: linear-gradient(135deg, #12121a, #1a1a2e);
    border: 2px solid var(--green); border-radius: 12px;
    padding: 28px; margin-top: 16px;
  }
  .result.show { display: block; animation: fadeUp 0.5s ease; }

  .player-match {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(38px, 9vw, 68px); line-height: 1;
    background: linear-gradient(135deg, var(--gold), #ff8c00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin: 6px 0 2px;
  }
  .result-subtitle { color: var(--muted); font-size: 13px; margin-bottom: 14px; letter-spacing: 1px; }
  .result-explanation { font-size: 15px; line-height: 1.7; margin-bottom: 20px; color: var(--text); }

  .stats { display: grid; gap: 12px; margin-bottom: 20px; }
  .stat-row { display: flex; align-items: center; gap: 12px; }
  .stat-name { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); width: 130px; flex-shrink: 0; text-transform: uppercase; }
  .stat-bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .stat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); border-radius: 4px; width: 0; transition: width 1.1s cubic-bezier(.22,1,.36,1); }
  .stat-val { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 18px; color: var(--green); width: 44px; text-align: right; }

  .share-line {
    background: rgba(0,255,135,0.08); border: 1px solid rgba(0,255,135,0.3);
    border-radius: 6px; padding: 12px 16px; font-size: 14px;
    color: var(--green); font-weight: 600;
  }

  .level-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,215,0,0.1); border: 1.5px solid var(--gold);
    color: var(--gold); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 14px; letter-spacing: 2px;
    padding: 5px 14px; border-radius: 4px; margin-bottom: 14px; text-transform: uppercase;
  }
  .story-text {
    font-size: 15px; line-height: 1.75; color: var(--text);
    margin-bottom: 20px; border-left: 3px solid var(--green); padding-left: 16px;
  }
  .career-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  .cstat { background: #1a1a26; border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .cstat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--green); line-height: 1; }
  .cstat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; text-transform: uppercase; }

  .choice-btn {
    display: block; width: 100%; text-align: left;
    background: #1a1a26; border: 2px solid var(--border);
    color: var(--text); font-family: 'Barlow', sans-serif;
    font-size: 15px; padding: 14px 18px; border-radius: 8px;
    cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .choice-btn:hover { border-color: var(--green); color: var(--green); background: rgba(0,255,135,0.05); }
  .choice-lbl { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; color: var(--green); margin-right: 10px; }

  .final-wrap {
    background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(0,255,135,0.05));
    border: 2px solid var(--gold); border-radius: 12px; padding: 26px; text-align: center;
  }
  .final-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 52px;
    background: linear-gradient(135deg, var(--gold), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .peak-box {
    background: #1a1a26; border-radius: 8px; padding: 14px;
    margin: 14px 0; font-size: 14px; color: var(--gold); text-align: left;
  }
</style>
</head>

function scorePlayer(p, club, pos, style, pers) {
  let s = 0;
  if (p.tags.includes(club)) s += 3;
  if (p.tags.includes(pos))  s += 4;
  if (p.tags.includes(style))s += 4;
  if (p.tags.includes(pers)) s += 3;
  return s + Math.random() * 1.8;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=> t.classList.toggle('active',['personality','career'][i]===tab));
  document.querySelectorAll('.section').forEach(s=> s.classList.toggle('active', s.id===tab));
}

function runPersonality() {
  const club = document.getElementById('p-club').value;
  const pos  = document.getElementById('p-position').value;
  const sty  = document.getElementById('p-style').value;
  const pers = document.getElementById('p-personality').value;
  if (!club||!pos||!sty||!pers) { alert('Please fill in all 4 fields! ⚽'); return; }

  let best = null, bestScore = -1;
  PLAYERS.forEach(p => { const sc = scorePlayer(p,club,pos,sty,pers); if(sc>bestScore){bestScore=sc;best=p;} });

  const v = () => Math.floor(Math.random()*6)-3;
  const stats = [
    { name:'Play Style Match', val: Math.min(99, best.style+v()) },
    { name:'Skill Level',       val: Math.min(99, best.skill+v()) },
    { name:'Leadership',        val: Math.min(99, best.leadership+v()) }
  ];

  document.getElementById('p-name').textContent = best.emoji+' '+best.name;
  document.getElementById('p-sub').textContent  = best.subtitle;
  document.getElementById('p-exp').textContent  = best.exp;
  document.getElementById('p-stats').innerHTML  = stats.map(s=>`
    <div class="stat-row">
      <div class="stat-name">${s.name}</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill" data-val="${s.val}"></div></div>
      <div class="stat-val">${s.val}%</div>
    </div>`).join('');
  document.getElementById('p-share').textContent = `🔥 Only real fans get ${best.name} — share to prove it!`;

  const res = document.getElementById('p-result');
  res.className = 'result show';
  setTimeout(()=>{ document.querySelectorAll('.stat-bar-fill').forEach(b=>b.style.width=b.dataset.val+'%'); },120);
}

        a:"Move to Europe — join your dream club", b:"Stay and lead your club to the league title" },
    B:{ level:"Pro", skill:79, fans:"210K",
        story:"Your patience pays off beautifully. Season after season of excellence. You win the league, get your first international call-up, and receive Player of the Year. The world is finally watching.",
        a:"Accept a massive contract from a foreign superclub", b:"Become captain and build a dynasty here" } },
  { A:{ final:true, title:"World Class Legend 🌟",
        summary:"From a small town kid with a dream to a global football icon — your journey inspired millions. You won everything, scored everywhere, and loved every second. When people talk about the greatest to ever play, your name is always first.",
        peak:"Scoring the winner in the World Cup Final", goals:312, fans:"18.4M" },
    B:{ final:true, title:"One Club Legend 🏆",
        summary:"You could have chased money and fame elsewhere — but you chose loyalty. Five league titles, three cup trebles, Champions League glory. Your name is synonymous with your club forever.",
        peak:"Leading your club to a historic unbeaten league season", goals:276, fans:"11.2M" } }
];

let cStep = 0;
let cPath = null;

function startCareer() {
  cStep = 0; cPath = null;
  renderStep(STEPS[0]);
}

function makeChoice(choice) {
  cStep++;
  if (cStep >= STEPS.length) return;
  const outcome = STEPS[cStep][choice];
  cPath = choice;
  renderStep(outcome, cStep);
}

function renderStep(data, step) {
  const box = document.getElementById('career-box');
  if (data.final) {
    box.innerHTML = `
      <div class="card">
        <div class="final-wrap">
          <div style="color:var(--muted);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px">Career Complete · Your Legacy</div>
          <div class="final-title">${data.title}</div>
          <p style="margin:16px 0;color:var(--text);font-size:15px;line-height:1.75">${data.summary}</p>
          <div class="peak-box">⭐ Peak Moment: ${data.peak}</div>
          <div class="career-stats">
            <div class="cstat"><div class="cstat-val" style="color:var(--gold)">${data.goals}</div><div class="cstat-label">Career Goals</div></div>
            <div class="cstat"><div class="cstat-val" style="color:var(--green)">${data.fans}</div><div class="cstat-label">Fan Following</div></div>
            <div class="cstat"><div class="cstat-val">🏆</div><div class="cstat-label">Legend</div></div>
          </div>
        </div>
        <button class="btn btn-outline" onclick="startCareer()" style="margin-top:16px">🔄 Play Again</button>
      </div>`;
    return;
  }

  const showStats = (step === undefined || step % 2 === 0);
  box.innerHTML = `
    <div class="card" style="animation:fadeUp 0.4s ease">
      <div class="level-badge">🏅 ${data.level}</div>
      <div class="story-text">${data.story}</div>
      ${showStats ? `
      <div class="career-stats">
        <div class="cstat"><div class="cstat-val">${data.skill}</div><div class="cstat-label">Skill Rating</div></div>
        <div class="cstat"><div class="cstat-val" style="color:var(--gold)">${data.fans}</div><div class="cstat-label">Fans</div></div>
        <div class="cstat"><div class="cstat-val">${(step||0)+1}</div><div class="cstat-label">Chapter</div></div>
      </div>` : ''}
      <div style="font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:14px 0 8px">Your Next Move</div>
      <button class="choice-btn" onclick="makeChoice('A')"><span class="choice-lbl">A</span>${data.a}</button>
      <button class="choice-btn" onclick="makeChoice('B')"><span class="choice-lbl">B</span>${data.b}</button>
    </div>`;
}
</script>
</body>
</html>
